<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Jamma Audio Flow</title>
  <desc id="desc">Capture and playback signal flow through ChannelMixer and loop model objects.</desc>
  <defs>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .lane { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .capture { fill: #fff7ed; }
      .playback { fill: #eff6ff; }
      .loop { fill: #ecfeff; }
      .arrowCap { stroke: #9a3412; stroke-width: 2.2; fill: none; marker-end: url(#arrowCap); }
      .arrowPlay { stroke: #1d4ed8; stroke-width: 2.2; fill: none; marker-end: url(#arrowPlay); }
    </style>
    <marker id="arrowCap" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a3412" />
    </marker>
    <marker id="arrowPlay" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="560" fill="#ffffff" />
  <text x="40" y="46" class="title">Capture and Playback Data Flow</text>

  <text x="40" y="92" class="lane">Capture path (ADC -&gt; loop write)</text>
  <rect x="40" y="110" width="150" height="80" class="box capture" />
  <text x="58" y="145" class="label">ADC Input</text>

  <rect x="230" y="110" width="200" height="80" class="box capture" />
  <text x="250" y="145" class="label">ChannelMixer</text>
  <text x="250" y="165" class="small">capture buffer</text>

  <rect x="470" y="110" width="220" height="80" class="box capture" />
  <text x="490" y="145" class="label">Monitor + latency</text>
  <text x="490" y="165" class="small">compensated routing</text>

  <rect x="730" y="110" width="310" height="80" class="box loop" />
  <text x="750" y="145" class="label">Station -&gt; LoopTake -&gt; Loop</text>
  <text x="750" y="165" class="small">record / bounce writes</text>

  <path class="arrowCap" d="M190 150 L225 150" />
  <path class="arrowCap" d="M430 150 L465 150" />
  <path class="arrowCap" d="M690 150 L725 150" />

  <text x="40" y="292" class="lane">Playback path (loop read -&gt; DAC)</text>
  <rect x="40" y="310" width="310" height="80" class="box loop" />
  <text x="60" y="345" class="label">Station -&gt; LoopTake -&gt; Loop</text>
  <text x="60" y="365" class="small">mix / read into output bus</text>

  <rect x="390" y="310" width="220" height="80" class="box playback" />
  <text x="410" y="345" class="label">AudioBuffer / mixer</text>
  <text x="410" y="365" class="small">sample summing</text>

  <rect x="650" y="310" width="200" height="80" class="box playback" />
  <text x="670" y="345" class="label">ChannelMixer</text>
  <text x="670" y="365" class="small">output sink</text>

  <rect x="890" y="310" width="150" height="80" class="box playback" />
  <text x="915" y="345" class="label">DAC Out</text>

  <path class="arrowPlay" d="M350 350 L385 350" />
  <path class="arrowPlay" d="M610 350 L645 350" />
  <path class="arrowPlay" d="M850 350 L885 350" />

  <text x="40" y="470" class="small">Design intent: keep callback-path operations predictable (no allocations, no blocking, minimal overhead).</text>
</svg>
